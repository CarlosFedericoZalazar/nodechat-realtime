<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style/main.css">
  <title>NodeChat</title>
</head>

<body>
  
  <div class="app">
    
    <!-- Sidebar usuarios -->
    <aside class="sidebar" id="usersContainer">
      <h3>Usuarios online</h3>
      <ul class="sidebar-list" id="usersList"></ul>
    </aside>
    
    <aside class="sidebar" id="roomsContainer">
      <h3>Rooms</h3>
      <ul class="sidebar-list" id="roomsList"></ul>     
    </aside>
    
    <!-- Chat principal -->
    <main class="chat-container">
      <div id="chat-head" class="centered">
        <h1 id="title">💬 NodeChat</h1>
        <div id="buttonsHeader" class="hidden">
          <button id="btnExit" class="button">SALIR</button>
          <button id="btnUsers" class="button">👥</button>
          <button id="btnRooms" class="button">💬 Rooms</button>
        </div>
      </div>
      <h2 id="title-room" class="hidden">Room</h2>

      <div id="container-nik">
        <label for="inputNik">ENTER YOUR NIK!</label>
        <input id="inputNik" placeholder="your nick!" class="input">
        <p id="nickError" class="error-message hidden"></p>
        <button class="button" id="btnNik">My Nik!</button>
      </div>

      <div id="chat" class="hidden"></div>

      <div id= "input-area" class="input-area hidden">
        <input type="text" id="messageInput" class="input" placeholder="Escribí un mensaje..." />
        <button id="btnMessage" class="button">Enviar</button>
      </div>

    </main>

  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script type="module" src="./js/main.js"></script>

</body>
</html>
